<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>แปลงรูปเป็น PDF</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449;
    --line:#334155; --text:#e2e8f0; --muted:#94a3b8;
    --accent:#6366f1; --accent2:#818cf8; --danger:#ef4444; --ok:#22c55e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"Segoe UI","Sarabun","Noto Sans Thai",sans-serif;
    padding:0 0 120px;
  }
  header{
    position:sticky; top:0; z-index:5; background:rgba(15,23,42,.92);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
    padding:14px 16px calc(14px + env(safe-area-inset-top));
    padding-top:max(14px, env(safe-area-inset-top));
  }
  header h1{margin:0; font-size:19px; display:flex; align-items:center; gap:8px}
  header p{margin:4px 0 0; font-size:12px; color:var(--muted)}
  .wrap{max-width:560px; margin:0 auto; padding:16px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px}
  label.fld{display:block; font-size:13px; color:var(--muted); margin:0 0 8px}
  select, input[type=range]{width:100%}
  select{
    background:var(--card2); color:var(--text); border:1px solid var(--line);
    border-radius:10px; padding:11px 12px; font-size:15px; appearance:none;
  }
  .row{display:flex; gap:12px}
  .row>div{flex:1}
  .qual{display:flex; align-items:center; gap:10px}
  .qual b{min-width:46px; text-align:right; font-variant-numeric:tabular-nums}
  input[type=range]{accent-color:var(--accent); height:28px}
  .btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; border:0; border-radius:14px; padding:15px; font-size:16px;
    font-weight:600; cursor:pointer; font-family:inherit;
  }
  .btn-add{background:var(--card2); color:var(--text); border:1px dashed var(--line)}
  .btn-add:active{background:var(--line)}
  .btn-go{background:var(--accent); color:#fff; box-shadow:0 6px 20px rgba(99,102,241,.35)}
  .btn-go:disabled{opacity:.4; box-shadow:none}
  .btn-go:active:not(:disabled){background:#4f46e5}
  .empty{text-align:center; color:var(--muted); font-size:14px; padding:18px 0}
  ul#list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px}
  li.item{display:flex; align-items:center; gap:12px; background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:8px}
  li.item img{width:54px; height:54px; object-fit:cover; border-radius:8px; flex:none; background:#000}
  .meta{flex:1; min-width:0}
  .meta .nm{font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .meta .sz{font-size:11px; color:var(--muted); margin-top:2px}
  .acts{display:flex; gap:4px; flex:none}
  .icbtn{width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--card); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center}
  .icbtn:active{background:var(--line)}
  .icbtn.del{color:var(--danger)}
  .footbar{
    position:fixed; left:0; right:0; bottom:0; background:rgba(15,23,42,.96);
    backdrop-filter:blur(8px); border-top:1px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  }
  .footbar .wrap{padding:0}
  #status{font-size:13px; color:var(--muted); text-align:center; margin-bottom:10px; min-height:18px}
  #status.ok{color:var(--ok)} #status.err{color:var(--danger)}
  .dl{display:block; text-align:center; background:var(--ok); color:#04210f; font-weight:700; text-decoration:none; border-radius:14px; padding:14px; margin-top:10px}
  .hint{font-size:11px; color:var(--muted); margin-top:6px}
  .pill{display:inline-block; font-size:11px; background:var(--card2); border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:3px 9px; margin-top:8px}
</style>
</head>
<body>
<header>
  <h1>📄 แปลงรูปเป็น PDF</h1>
  <p>เลือกรูป → ปรับคุณภาพ/ขนาด → ได้ไฟล์ PDF • ทำงานในเครื่อง ไม่ส่งรูปขึ้นเน็ต</p>
</header>

<div class="wrap">
  <input id="file" type="file" accept="image/*" multiple hidden>
  <button class="btn btn-add" id="add">➕ เพิ่มรูป (เลือกได้หลายรูป)</button>

  <div class="card" style="margin-top:14px">
    <ul id="list"></ul>
    <div class="empty" id="empty">ยังไม่มีรูป — กดปุ่ม “เพิ่มรูป” ด้านบน</div>
  </div>

  <div class="card">
    <label class="fld">คุณภาพรูป (ยิ่งสูงยิ่งชัด ไฟล์ใหญ่ขึ้น)</label>
    <div class="qual">
      <input id="quality" type="range" min="50" max="100" value="85" step="1">
      <b id="qval">85%</b>
    </div>
    <div class="row" style="margin-top:14px">
      <div>
        <label class="fld">ลดขนาดภาพ (ด้านยาวสุด)</label>
        <select id="resize">
          <option value="0">ขนาดเต็ม (ไม่ลด)</option>
          <option value="3000">3000 px</option>
          <option value="2400">2400 px</option>
          <option value="2000" selected>2000 px (แนะนำ)</option>
          <option value="1600">1600 px</option>
          <option value="1200">1200 px (ไฟล์เล็ก)</option>
        </select>
      </div>
      <div>
        <label class="fld">ขนาดหน้า PDF</label>
        <select id="page">
          <option value="auto" selected>พอดีกับรูป</option>
          <option value="a4">A4</option>
          <option value="letter">Letter</option>
        </select>
      </div>
    </div>
    <div class="hint">เคล็ดลับ: เอกสาร/ข้อความใช้ 2000px + 85% กำลังดี • รูปสวยเก็บชัดใช้ 3000px + 90–95%</div>
  </div>
</div>

<div class="footbar">
  <div class="wrap">
    <div id="status"></div>
    <button class="btn btn-go" id="go" disabled>🔄 สร้าง PDF</button>
    <span id="result"></span>
  </div>
</div>

<script>
"use strict";
const $ = s => document.querySelector(s);
let images = []; // {file, url, name}

const fmtSize = b => b < 1024 ? b+" B" : b < 1048576 ? (b/1024).toFixed(0)+" KB" : (b/1048576).toFixed(2)+" MB";

function render(){
  const ul = $("#list"); ul.innerHTML = "";
  $("#empty").style.display = images.length ? "none" : "block";
  images.forEach((im, i) => {
    const li = document.createElement("li"); li.className = "item";
    li.innerHTML = `
      <img src="${im.url}" alt="">
      <div class="meta">
        <div class="nm">${i+1}. ${im.name}</div>
        <div class="sz">${fmtSize(im.file.size)}</div>
      </div>
      <div class="acts">
        <button class="icbtn" data-up="${i}" ${i===0?"disabled style=opacity:.3":""}>↑</button>
        <button class="icbtn" data-down="${i}" ${i===images.length-1?"disabled style=opacity:.3":""}>↓</button>
        <button class="icbtn del" data-del="${i}">✕</button>
      </div>`;
    ul.appendChild(li);
  });
  $("#go").disabled = images.length === 0;
}

$("#list").addEventListener("click", e => {
  const t = e.target.closest("button"); if(!t) return;
  if(t.dataset.del !== undefined){ const i=+t.dataset.del; URL.revokeObjectURL(images[i].url); images.splice(i,1); }
  if(t.dataset.up !== undefined){ const i=+t.dataset.up; [images[i-1],images[i]]=[images[i],images[i-1]]; }
  if(t.dataset.down !== undefined){ const i=+t.dataset.down; [images[i+1],images[i]]=[images[i],images[i+1]]; }
  render();
});

$("#add").onclick = () => $("#file").click();
$("#file").onchange = e => {
  for(const f of e.target.files){
    if(!f.type.startsWith("image/")) continue;
    images.push({file:f, url:URL.createObjectURL(f), name:f.name});
  }
  e.target.value = "";
  $("#result").innerHTML=""; $("#status").textContent=""; $("#status").className="";
  render();
};

$("#quality").oninput = e => $("#qval").textContent = e.target.value + "%";

// ---------- รูป → JPEG (ย่อขนาด + คุณภาพ) ----------
function loadImage(file){
  return new Promise((res,rej)=>{
    const img=new Image(); const u=URL.createObjectURL(file);
    img.onload=()=>{res(img); URL.revokeObjectURL(u);};
    img.onerror=()=>{URL.revokeObjectURL(u); rej(new Error("เปิดรูปไม่ได้: "+file.name));};
    img.src=u;
  });
}
async function processImage(file, maxLong, quality){
  const img = await loadImage(file);
  let w = img.naturalWidth, h = img.naturalHeight;
  if(maxLong && Math.max(w,h) > maxLong){
    const s = maxLong / Math.max(w,h);
    w = Math.round(w*s); h = Math.round(h*s);
  }
  const c = document.createElement("canvas"); c.width=w; c.height=h;
  const x = c.getContext("2d");
  x.fillStyle="#fff"; x.fillRect(0,0,w,h);           // กันรูปโปร่งใส (PNG) เป็นพื้นดำ
  x.imageSmoothingQuality="high";
  x.drawImage(img,0,0,w,h);
  const blob = await new Promise(r=>c.toBlob(r,"image/jpeg",quality));
  return {bytes:new Uint8Array(await blob.arrayBuffer()), w, h};
}

// ---------- สร้าง PDF (ฝัง JPEG ตรงๆ ด้วย DCTDecode — ไม่ต้องมี library) ----------
function buildPdf(items, pageMode){
  const enc = new TextEncoder();
  const chunks = []; let len = 0; const off = {};
  const out = d => { if(typeof d==="string") d=enc.encode(d); chunks.push(d); len+=d.length; };
  const mark = n => off[n]=len;
  const f = n => (Math.round(n*100)/100).toString();

  out("%PDF-1.4\n");
  out(new Uint8Array([0x25,0xE2,0xE3,0xCF,0xD3,0x0A]));   // binary marker

  const N = items.length, total = 2 + 3*N;
  mark(1); out("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");
  const kids = items.map((_,i)=>`${3+3*i} 0 R`).join(" ");
  mark(2); out(`2 0 obj\n<< /Type /Pages /Kids [${kids}] /Count ${N} >>\nendobj\n`);

  items.forEach((it,i)=>{
    const pg=3+3*i, ct=4+3*i, im=5+3*i;
    // จัดวางรูปบนหน้า
    let pw,ph,dx,dy,dw,dh;
    if(pageMode==="auto"){ pw=it.w; ph=it.h; dx=0; dy=0; dw=it.w; dh=it.h; }
    else{
      const A4=[595.28,841.89], LT=[612,792];
      let [pwS,phS]= pageMode==="a4"?A4:LT;
      if(it.w>it.h){ [pwS,phS]=[phS,pwS]; }            // รูปแนวนอน → หน้าแนวนอน
      pw=pwS; ph=phS;
      const s=Math.min(pw/it.w, ph/it.h);
      dw=it.w*s; dh=it.h*s; dx=(pw-dw)/2; dy=(ph-dh)/2;
    }
    mark(pg);
    out(`${pg} 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${f(pw)} ${f(ph)}] /Resources << /XObject << /Im0 ${im} 0 R >> >> /Contents ${ct} 0 R >>\nendobj\n`);
    const stream = `q\n${f(dw)} 0 0 ${f(dh)} ${f(dx)} ${f(dy)} cm\n/Im0 Do\nQ\n`;
    const sb = enc.encode(stream);
    mark(ct); out(`${ct} 0 obj\n<< /Length ${sb.length} >>\nstream\n`); out(sb); out("\nendstream\nendobj\n");
    mark(im); out(`${im} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${it.w} /Height ${it.h} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${it.bytes.length} >>\nstream\n`);
    out(it.bytes); out("\nendstream\nendobj\n");
  });

  const xref = len;
  let t = `xref\n0 ${total+1}\n0000000000 65535 f \n`;
  for(let n=1;n<=total;n++) t += String(off[n]||0).padStart(10,"0")+" 00000 n \n";
  out(t);
  out(`trailer\n<< /Size ${total+1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`);
  return new Blob(chunks,{type:"application/pdf"});
}

// ---------- ปุ่มสร้าง ----------
$("#go").onclick = async () => {
  const q = (+$("#quality").value)/100;
  const maxLong = +$("#resize").value;
  const pageMode = $("#page").value;
  const st = $("#status"); st.className=""; $("#result").innerHTML="";
  $("#go").disabled = true;
  try{
    const items=[]; let outBytes=0;
    for(let i=0;i<images.length;i++){
      st.textContent = `กำลังประมวลผลรูป ${i+1}/${images.length} …`;
      const it = await processImage(images[i].file, maxLong, q);
      outBytes += it.bytes.length; items.push(it);
      await new Promise(r=>setTimeout(r));            // ปล่อยให้ UI หายใจ
    }
    st.textContent = "กำลังประกอบไฟล์ PDF …";
    const pdf = buildPdf(items, pageMode);
    const url = URL.createObjectURL(pdf);
    const d = new Date();
    const name = `รูป_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}_${String(d.getHours()).padStart(2,"0")}${String(d.getMinutes()).padStart(2,"0")}.pdf`;
    st.className="ok"; st.textContent = `✅ เสร็จแล้ว — ${images.length} หน้า • ขนาดไฟล์ ${fmtSize(pdf.size)}`;
    $("#result").innerHTML = `<a class="dl" href="${url}" download="${name}">⬇️ บันทึก / เปิด PDF</a>`;
  }catch(err){
    st.className="err"; st.textContent = "❌ " + (err.message||"เกิดข้อผิดพลาด");
  }finally{
    $("#go").disabled = images.length===0;
  }
};

// เผยฟังก์ชันไว้ทดสอบ
window.JADPDF = {processImage, buildPdf};

// PWA manifest แบบฝังในไฟล์ (ช่วยตอน “เพิ่มไปหน้าจอหลัก”)
try{
  const icon = "data:image/svg+xml," + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="96" fill="#6366f1"/><text x="50%" y="56%" font-size="240" text-anchor="middle" fill="#fff" font-family="sans-serif">PDF</text></svg>`);
  const mf = {name:"แปลงรูปเป็น PDF", short_name:"รูป→PDF", start_url:".", display:"standalone",
    background_color:"#0f172a", theme_color:"#6366f1",
    icons:[{src:icon, sizes:"512x512", type:"image/svg+xml"}]};
  const l = document.createElement("link"); l.rel="manifest";
  l.href = "data:application/manifest+json," + encodeURIComponent(JSON.stringify(mf));
  document.head.appendChild(l);
}catch(e){}
</script>
</body>
</html>

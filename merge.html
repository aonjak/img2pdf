<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>รวม PDF เป็นไฟล์เดียว</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449;
    --line:#334155; --text:#e2e8f0; --muted:#94a3b8;
    --accent:#6366f1; --accent2:#818cf8; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"Segoe UI","Sarabun","Noto Sans Thai",sans-serif;
    padding:0 0 150px;
  }
  a{color:var(--accent2)}
  header{
    position:sticky; top:0; z-index:5; background:rgba(15,23,42,.92);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
    padding:12px 16px; padding-top:max(12px, env(safe-area-inset-top));
  }
  header .back{display:inline-block; font-size:13px; color:var(--accent2); text-decoration:none; margin-bottom:8px}
  header .back:active{opacity:.6}
  header h1{margin:0; font-size:19px; display:flex; align-items:center; gap:8px}
  header p{margin:4px 0 0; font-size:12px; color:var(--muted)}
  .wrap{max-width:560px; margin:0 auto; padding:16px}
  .btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; border:0; border-radius:14px; padding:15px; font-size:16px;
    font-weight:600; cursor:pointer; font-family:inherit;
  }
  .btn-add{background:var(--card2); color:var(--text); border:1px dashed var(--line)}
  .btn-add:active{background:var(--line)}
  .btn-go{background:var(--accent); color:#fff; box-shadow:0 6px 20px rgba(99,102,241,.35)}
  .btn-go:disabled{opacity:.4; box-shadow:none; cursor:default}
  .btn-go:active:not(:disabled){background:#4f46e5}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-top:14px}
  .empty{text-align:center; color:var(--muted); font-size:14px; padding:18px 0; line-height:1.6}
  ul#list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px}
  li.item{display:flex; align-items:center; gap:10px; background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:10px}
  .idx{width:26px; height:26px; flex:none; border-radius:8px; background:var(--accent); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; font-variant-numeric:tabular-nums}
  .meta{flex:1; min-width:0}
  .meta .nm{font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .meta .sz{font-size:11px; color:var(--muted); margin-top:3px; font-variant-numeric:tabular-nums}
  .meta .sz.bad{color:var(--danger)}
  .acts{display:flex; gap:4px; flex:none}
  .icbtn{width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--card); color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:inherit}
  .icbtn:active{background:var(--line)}
  .icbtn:disabled{opacity:.3; cursor:default}
  .icbtn.del{color:var(--danger)}
  .hint{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.6}
  .footbar{
    position:fixed; left:0; right:0; bottom:0; background:rgba(15,23,42,.96);
    backdrop-filter:blur(8px); border-top:1px solid var(--line);
    padding:12px 16px; padding-bottom:max(12px, env(safe-area-inset-bottom));
  }
  .footbar .inner{max-width:560px; margin:0 auto}
  #status{font-size:13px; color:var(--muted); text-align:center; margin-bottom:10px; min-height:18px; line-height:1.5}
  #status.ok{color:var(--ok)} #status.err{color:var(--danger)} #status.warn{color:var(--warn)}
  .dl{display:block; text-align:center; background:var(--ok); color:#04210f; font-weight:700; text-decoration:none; border-radius:14px; padding:14px; margin-top:10px}
  .dl:active{filter:brightness(.95)}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">← หน้าหลัก</a>
  <h1>🔗 รวม PDF เป็นไฟล์เดียว</h1>
  <p>🔒 ทำงานในเครื่อง ไม่ส่งไฟล์ขึ้นเน็ต</p>
</header>

<div class="wrap">
  <input id="file" type="file" accept="application/pdf" multiple hidden>
  <button class="btn btn-add" id="add">➕ เพิ่มไฟล์ PDF</button>

  <div class="card">
    <ul id="list"></ul>
    <div class="empty" id="empty">ยังไม่มีไฟล์ — กดปุ่ม “เพิ่มไฟล์ PDF” ด้านบน<br>เพิ่มอย่างน้อย 2 ไฟล์เพื่อรวมเป็นไฟล์เดียว</div>
    <div class="hint" id="hint" style="display:none">ลำดับการรวมจะเรียงจากบนลงล่าง — ใช้ปุ่ม ↑ ↓ เพื่อจัดลำดับ</div>
  </div>
</div>

<div class="footbar">
  <div class="inner">
    <div id="status"></div>
    <button class="btn btn-go" id="go" disabled>🔗 รวมเป็นไฟล์เดียว</button>
    <span id="result"></span>
  </div>
</div>

<script src="vendor/merge/pdf-lib.min.js"></script>
<script>
"use strict";
const $ = s => document.querySelector(s);
let files = [];   // {file, name, size, pages|null, ok:bool, err:string|null}
let busy = false;
let uid = 0;

const fmtSize = b => b < 1024 ? b+" B" : b < 1048576 ? (b/1024).toFixed(0)+" KB" : (b/1048576).toFixed(2)+" MB";

// ---------- core merge logic (shared with tests via window.JADMERGE) ----------
// inputs: Array<{ name:string, bytes:Uint8Array }> in the desired output order.
// returns: { bytes:Uint8Array, pageCount:number, perFile:Array<{name,pages}> }
// throws an Error tagged with .fileName when a specific file can't be opened
// (invalid / encrypted / password-protected).
async function mergePdfs(inputs){
  if(!inputs || inputs.length < 2) throw new Error("ต้องมีไฟล์ PDF อย่างน้อย 2 ไฟล์");
  const { PDFDocument } = (typeof PDFLib !== "undefined") ? PDFLib : require("pdf-lib");
  const merged = await PDFDocument.create();
  const perFile = [];
  for(const inp of inputs){
    let src;
    try{
      // ignoreEncryption:false → pdf-lib throws on encrypted/password PDFs (we catch below)
      src = await PDFDocument.load(inp.bytes, { ignoreEncryption: false });
    }catch(e){
      const err = new Error("ไฟล์นี้มีรหัสผ่าน/เปิดไม่ได้: " + inp.name);
      err.fileName = inp.name;
      err.cause = e;
      throw err;
    }
    const idxs = src.getPageIndices();            // [0..n-1] in original order
    const copied = await merged.copyPages(src, idxs);
    copied.forEach(p => merged.addPage(p));        // preserves order
    perFile.push({ name: inp.name, pages: idxs.length });
  }
  const bytes = await merged.save();               // Uint8Array, starts with "%PDF"
  return { bytes, pageCount: merged.getPageCount(), perFile };
}

// read a File/Blob → Uint8Array
function readBytes(file){
  return new Promise((res, rej)=>{
    const fr = new FileReader();
    fr.onload = () => res(new Uint8Array(fr.result));
    fr.onerror = () => rej(new Error("อ่านไฟล์ไม่ได้: " + (file.name||"")));
    fr.readAsArrayBuffer(file);
  });
}

// ---------- UI ----------
function render(){
  const ul = $("#list"); ul.innerHTML = "";
  const has = files.length > 0;
  $("#empty").style.display = has ? "none" : "block";
  $("#hint").style.display = has ? "block" : "none";
  files.forEach((it, i) => {
    const li = document.createElement("li"); li.className = "item";
    const idx = document.createElement("div"); idx.className = "idx"; idx.textContent = i+1;
    const meta = document.createElement("div"); meta.className = "meta";
    const nm = document.createElement("div"); nm.className = "nm"; nm.textContent = it.name;
    const sz = document.createElement("div"); sz.className = "sz";
    if(it.err){ sz.classList.add("bad"); sz.textContent = "⚠️ " + it.err; }
    else if(it.pages == null){ sz.textContent = "กำลังอ่าน… • " + fmtSize(it.size); }
    else { sz.textContent = it.pages + " หน้า • " + fmtSize(it.size); }
    meta.appendChild(nm); meta.appendChild(sz);

    const acts = document.createElement("div"); acts.className = "acts";
    const up = document.createElement("button"); up.className="icbtn"; up.type="button";
    up.textContent="↑"; up.dataset.up=i; up.disabled = (i===0);
    const dn = document.createElement("button"); dn.className="icbtn"; dn.type="button";
    dn.textContent="↓"; dn.dataset.down=i; dn.disabled = (i===files.length-1);
    const del = document.createElement("button"); del.className="icbtn del"; del.type="button";
    del.textContent="✕"; del.dataset.del=i;
    acts.appendChild(up); acts.appendChild(dn); acts.appendChild(del);

    li.appendChild(idx); li.appendChild(meta); li.appendChild(acts);
    ul.appendChild(li);
  });
  updateGo();
}

function updateGo(){
  const valid = files.filter(f => f.ok);
  $("#go").disabled = busy || valid.length < 2;
}

function clearResult(){
  $("#result").innerHTML = "";
  const st = $("#status"); st.textContent = ""; st.className = "";
}

$("#list").addEventListener("click", e => {
  const t = e.target.closest("button"); if(!t || busy) return;
  if(t.dataset.del   !== undefined){ const i=+t.dataset.del;  files.splice(i,1); }
  else if(t.dataset.up   !== undefined){ const i=+t.dataset.up;   [files[i-1],files[i]]=[files[i],files[i-1]]; }
  else if(t.dataset.down !== undefined){ const i=+t.dataset.down; [files[i+1],files[i]]=[files[i],files[i+1]]; }
  clearResult();
  render();
});

$("#add").onclick = () => $("#file").click();
$("#file").onchange = async e => {
  const picked = Array.from(e.target.files || []);
  e.target.value = "";
  clearResult();
  // add rows immediately (with "reading…" state), then probe page counts
  const added = [];
  for(const f of picked){
    const isPdf = f.type === "application/pdf" || /\.pdf$/i.test(f.name);
    const rec = { id:++uid, file:f, name:f.name, size:f.size, pages:null, ok:false, err:null, _probe:isPdf };
    if(!isPdf){ rec.err = "ไม่ใช่ไฟล์ PDF"; }
    files.push(rec); added.push(rec);
  }
  render();
  // probe each newly added valid file for page count / validity
  for(const rec of added){
    if(!rec._probe) continue;
    try{
      const bytes = await readBytes(rec.file);
      const { PDFDocument } = PDFLib;
      const doc = await PDFDocument.load(bytes, { ignoreEncryption: false });
      rec.pages = doc.getPageCount();
      rec.ok = true; rec.err = null;
    }catch(err){
      rec.ok = false; rec.pages = null;
      rec.err = "มีรหัสผ่าน/เปิดไม่ได้";
    }
    if(files.includes(rec)) render();   // refresh if not removed meanwhile
  }
};

$("#go").onclick = async () => {
  const valid = files.filter(f => f.ok);
  if(busy || valid.length < 2) return;
  const st = $("#status"); st.className = ""; $("#result").innerHTML = "";
  busy = true; updateGo();
  try{
    st.textContent = "กำลังอ่านไฟล์…";
    // build inputs in the *current listed order* (skip invalid rows)
    const inputs = [];
    for(const rec of files){
      if(!rec.ok) continue;
      const bytes = await readBytes(rec.file);
      inputs.push({ name: rec.name, bytes });
    }
    st.textContent = "กำลังรวมไฟล์ PDF …";
    const { bytes, pageCount, perFile } = await mergePdfs(inputs);

    const blob = new Blob([bytes], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);
    const d = new Date();
    const name = `รวม_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}_${String(d.getHours()).padStart(2,"0")}${String(d.getMinutes()).padStart(2,"0")}.pdf`;

    st.className = "ok";
    st.textContent = `✅ รวมเสร็จแล้ว — ${perFile.length} ไฟล์ • ${pageCount} หน้า • ${fmtSize(blob.size)}`;
    $("#result").innerHTML = "";
    const a = document.createElement("a");
    a.className = "dl"; a.href = url; a.download = name;
    a.textContent = "⬇️ บันทึก PDF";
    $("#result").appendChild(a);
  }catch(err){
    st.className = "err";
    st.textContent = "❌ " + (err && err.message ? err.message : "เกิดข้อผิดพลาด");
  }finally{
    busy = false; updateGo();
  }
};

// expose for tests (extracted & run in Node against the real shipped logic)
if(typeof window !== "undefined"){ window.JADMERGE = { mergePdfs, fmtSize }; }
if(typeof module !== "undefined" && module.exports){ module.exports = { mergePdfs }; }

// ---------- embedded PWA manifest (helps "Add to Home screen") ----------
try{
  const icon = "data:image/svg+xml," + encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="96" fill="#6366f1"/><text x="50%" y="56%" font-size="200" text-anchor="middle" fill="#fff" font-family="sans-serif">🔗PDF</text></svg>`);
  const mf = {name:"รวม PDF เป็นไฟล์เดียว", short_name:"รวม PDF", start_url:".", display:"standalone",
    background_color:"#0f172a", theme_color:"#6366f1",
    icons:[{src:icon, sizes:"512x512", type:"image/svg+xml"}]};
  const l = document.createElement("link"); l.rel="manifest";
  l.href = "data:application/manifest+json," + encodeURIComponent(JSON.stringify(mf));
  document.head.appendChild(l);
}catch(e){}
</script>
</body>
</html>
